services:
  nginx:
    image: nginx:latest
    container_name: ticket_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticket_app
    volumes:
      - ./src:/var/www
    depends_on:
      - postgres
      - redis
    user: "${UID}:${GID}"

  postgres:
    image: postgres:15
    container_name: ticket_postgres
    restart: always
    environment:
      POSTGRES_DB: ticket_manager
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ticket_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: ticket_redis
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticket_worker
    # queue:work: proceso persistente en memoria (más eficiente que queue:listen)
    # --sleep=3:      espera 3s cuando no hay jobs (ahorra CPU)
    # --tries=3:      reintenta 3 veces antes de marcar como fallido
    # --timeout=60:   mata un job si tarda más de 60s (evita jobs colgados)
    # --max-time=3600: reinicia el worker cada hora (previene memory leaks)
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --sleep=3
      - --tries=3
      - --timeout=60
      - --max-time=3600
    volumes:
      - ./src:/var/www
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "-r", "exit((new Redis())->connect('redis', 6379) ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mailpit:
    image: axllent/mailpit
    container_name: ticket_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
