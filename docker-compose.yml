services:
  nginx:
    image: nginx:latest
    container_name: ticket_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /var/www/node_modules
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticket_app
    volumes:
      - ./src:/var/www
    ports:
      - "5173:5173"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: ticket_postgres
    restart: always
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ticket_redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: ticket_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
